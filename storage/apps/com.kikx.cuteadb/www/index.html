<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CuteADB</title>
    <script src="/share/cdn/tailwind-3.js"></script>
  </head>
  <body class="text-xs">
    <!-- Fullscreen Loading Screen -->
    <div
      id="loading-screen"
      class="fixed inset-0 w-full h-full bg-black/60 flex flex-col justify-center items-center font-bold"
    >
      <div
        class="border-white border-b w-6 h-6 animate-spin rounded-full"
      ></div>
    </div>
    <!-- main -->
    <div id="main" class="h-screen flex flex-col gap-2 p-2">
      <div class="flex gap-1 overflow-x-auto scroll-smooth whitespace-nowrap">
        <div class="p-1 px-2 bg-white rounded text-black flex-shrink-0">
          INFO
        </div>
        <div class="p-1 px-2 bg-blue-400/60 rounded flex-shrink-0">
          localhost:54054
        </div>
        <div class="p-1 px-2 bg-pink-400/60 rounded flex-shrink-0">vivo</div>
        <div class="p-1 px-2 bg-orange-400/60 rounded flex-shrink-0">I2504</div>
      </div>
      <!-- main screen -->
      <div class="flex-1 border rounded"></div>
      <!-- utils screen -->
      <div
        class="w-full flex flex-nowrap gap-1 overflow-x-auto scroll-smooth whitespace-nowrap"
      >
        <div
          class="p-2 px-4 border rounded shadow bg-blue-400/60 flex-shrink-0"
        >
          Apps
        </div>
        <div
          class="p-2 px-4 border rounded shadow bg-pink-400/60 flex-shrink-0"
        >
          Files
        </div>
      </div>
      <!-- command run -->
      <div
        id="input-box"
        class="w-full relative flex items-center border p-1 rounded"
      >
        <input
          id="input-el"
          type="text"
          spellcheck="false"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          placeholder="Type command .. ૮(˶ᵔᵕᵔ˶)ა."
          class="w-full h-full bg-transparent focus:outline-none px-1"
        />
        <div id="input-send-btn">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="26"
            height="26"
            viewBox="0 0 16 16"
          >
            <g fill="currentColor">
              <path
                d="M2.78 2L2 2.41v12l.78.42l9-6V8zM3 13.48V3.35l7.6 5.07z"
              />
              <path
                fill-rule="evenodd"
                d="m6 14.683l8.78-5.853V8L6 2.147V3.35l7.6 5.07L6 13.48z"
                clip-rule="evenodd"
              />
            </g>
          </svg>
        </div>
      </div>
      <!-- scripts -->
      <div id="dock" class="border h-2/6 flex flex-col overflow-y-hidden">
        <div
          class="p-1 min-h-[2rem] max-h-[2rem] px-2 bg-gradient-to-r border border-white/80 from-pink-400/80 to-blue-400/80 text-white flex justify-between items-center"
        >
          <div>Scripts</div>
          <div class="flex gap-1 items-center">
            <div id="scripts-path"></div>
            <div id="back-btn">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="22"
                height="22"
                viewBox="0 0 24 24"
              >
                <path
                  fill="currentColor"
                  d="m4 10l-.707.707L2.586 10l.707-.707zm17 8a1 1 0 1 1-2 0zM8.293 15.707l-5-5l1.414-1.414l5 5zm-5-6.414l5-5l1.414 1.414l-5 5zM4 9h10v2H4zm17 7v2h-2v-2zm-7-7a7 7 0 0 1 7 7h-2a5 5 0 0 0-5-5z"
                />
              </svg>
            </div>
          </div>
        </div>
        <div
          id="scripts-list"
          class="flex-1 flex flex-col overflow-y-auto"
        ></div>
      </div>
    </div>

    <!-- scripts -->
    <script src="/share/cdn/jquery.min.js"></script>
    <script src="/share/static/app.js"></script>
    <script src="script.js"></script>
  </body>
</html>
