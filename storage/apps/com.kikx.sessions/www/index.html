<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sessions</title>

    <script src="/share/cdn/tailwind-3.js"></script>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Fullscreen Loading Screen -->
    <div
      id="loading-screen"
      class="fixed inset-0 w-full h-full bg-black/40 flex flex-col justify-center items-center font-bold"
    >
      <div
        class="border-white border-b w-6 h-6 animate-spin rounded-full"
      ></div>
    </div>

    <!-- main -->
    <div class="h-screen w-full p-2 flex text-white">
      <div class="flex-1 flex flex-col border rounded overflow-hidden">
        <!-- sessions -->
        <h1 class="p-2 bg-pink-400/80 text-center">SESSIONS</h1>
        <div id="sessions" class="flex-1 flex flex-col overflow-y-auto p-2">
          <!-- session -->
        </div>
      </div>
    </div>

    <script src="/share/cdn/jquery.min.js"></script>
    <script src="/share/static/app.js"></script>

    <script defer src="script.js"></script>
  </body>
</html>
