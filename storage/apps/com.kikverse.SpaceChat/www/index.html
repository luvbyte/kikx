<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpaceChat</title>

    <script src="/share/cdn/tailwind-3.js"></script>
  </head>
  <body>
    <!-- Fullscreen Loading Screen -->
    <div
      id="loading-screen"
      class="fixed inset-0 w-full h-full bg-black/60 flex flex-col justify-center items-center font-bold"
    >
      <div
        class="border-white border-b w-6 h-6 animate-spin rounded-full"
      ></div>
    </div>

    <div class="h-screen">
      <iframe
        id="frame"
        class="w-full h-full"
        allowfullscreen="true"
        allow="fullscreen"
        src="https://space-chat-kik.vercel.app/space/kikx"
      ></iframe>
    </div>

    <script src="script.js"></script>
  </body>
</html>
