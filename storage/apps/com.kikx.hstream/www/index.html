<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Settings</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="/share/cdn/tailwind-3.js"></script>
    <script src="/share/cdn/jquery.min.js"></script>

    <script src="/share/static/app.js"></script>

    <!-- QR Code Scanner Library -->
    <script src="/share/cdn/html5-qrcode.js" type="text/javascript"></script>
    <style>
      .tab-button.active {
        border-color: #f97316; /* Tailwind's orange-500 */
        background-color: rgba(249, 115, 22, 0.2);
      }
    </style>
  </head>
  <body class="w-screen h-screen m-0 p-0">
    <div id="main" class="flex items-center justify-center w-full h-full p-4">
      <div
        class="bg-gradient-to-br from-purple-400/40 via-white/20 to-blue-400/40 rounded-lg rounded-tl-none rounded-br-none p-6 min-h-[50%] w-full max-w-md text-white"
      >
        <form class="space-y-4">
          <!-- Tab Buttons -->
          <div class="flex justify-center mb-4">
            <button
              type="button"
              id="tab1"
              data-target="dropdown1"
              class="tab-button px-4 py-2 text-sm font-medium rounded-t-lg border-b-2 border-transparent text-white"
            >
              LO
            </button>
            <button
              type="button"
              id="tab2"
              data-target="dropdown2"
              class="tab-button px-4 py-2 text-sm font-medium rounded-t-lg border-b-2 border-transparent text-white"
            >
              IP
            </button>
            <button
              type="button"
              id="tab3"
              data-target="qr-scanner"
              class="tab-button px-4 py-2 text-sm font-medium rounded-t-lg border-b-2 border-transparent text-white"
            >
              QR
            </button>
          </div>

          <!-- Option 1: Address Entry -->
          <div id="dropdown1" class="space-y-4">
            <!-- Protocol dropdown -->
            <div>
              <label class="block text-sm font-medium">Protocol</label>
              <select
                class="w-full px-3 py-2 border bg-transparent rounded-md focus:outline-none focus:ring focus:border-blue-300"
              >
                <option value="http">http</option>
                <option value="https">https</option>
              </select>
            </div>

            <!-- IP / Hostname input -->
            <div>
              <label class="block text-sm font-medium">IP or Hostname</label>
              <input
                type="text"
                required
                placeholder="e.g. 192.168.1.1"
                class="w-full px-3 py-2 bg-transparent border rounded-md focus:outline-none focus:ring focus:border-blue-300"
              />
            </div>

            <!-- Port input -->
            <div>
              <label class="block text-sm font-medium">Port</label>
              <input
                type="number"
                required
                placeholder="e.g. 8080"
                value="8080"
                class="w-full px-3 py-2 border bg-transparent rounded-md focus:outline-none focus:ring focus:border-blue-300"
              />
            </div>
          </div>

          <!-- Option 2: ID and Password -->
          <div id="dropdown2" class="space-y-2 hidden">
            <label class="block text-sm font-medium">User ID</label>
            <input
              type="text"
              required
              placeholder="Enter ID"
              class="w-full px-3 py-2 border bg-transparent rounded-md focus:outline-none focus:ring focus:border-blue-300"
            />

            <label class="block text-sm font-medium">Password</label>
            <input
              type="password"
              required
              placeholder="Enter password"
              class="w-full px-3 py-2 border bg-transparent rounded-md focus:outline-none focus:ring focus:border-blue-300"
            />
          </div>

          <!-- Option 3: QR Scanner -->
          <div id="qr-scanner" class="hidden">
            <div
              id="qr-scanner-box"
              class="w-full aspect-square border rounded-md overflow-hidden"
            ></div>
          </div>

          <!-- Start Button -->
          <div class="pt-1">
            <button
              id="start-btn"
              type="button"
              class="w-full bg-blue-400/80 text-white py-2 rounded active:scale-105 transition duration-200"
            >
              Start
            </button>
          </div>
        </form>
      </div>
    </div>
    <script>
      $(document).ready(function () {
        let qrStarted = false;
        let qr;

        function showTab(targetId) {
          // Hide all dropdowns
          $("#dropdown1, #dropdown2, #qr-scanner").addClass("hidden");
          $(".tab-button").removeClass("active");

          // Show selected
          $("#" + targetId).removeClass("hidden");
          $(`.tab-button[data-target="${targetId}"]`).addClass("active");

          // Stop QR if switching away
          if (
            targetId !== "qr-scanner" &&
            typeof qr !== "undefined" &&
            qrStarted
          ) {
            qr.stop()
              .then(() => {
                console.log("QR scanner stopped.");
                qrStarted = false;
              })
              .catch(err => {
                console.error("Error stopping QR scanner:", err);
              });
          }

          // Start QR if switching to QR tab
          if (targetId === "qr-scanner" && !qrStarted) {
            qr = new Html5Qrcode("qr-scanner-box");
            Html5Qrcode.getCameras()
              .then(cameras => {
                if (cameras && cameras.length) {
                  qr.start(
                    cameras[1].id,
                    { fps: 10, qrbox: 200 },
                    decodedText => {
                      //alert("Scanned: " + decodedText);
                      qr.stop().then(() => {
                        qrStarted = false;
                        loadIFrame(decodedText);
                      });
                    },
                    error => {}
                  );
                  qrStarted = true;
                }
              })
              .catch(err => {
                console.error("Camera error:", err);
              });
          }
        }

        // Tab click logic
        $(".tab-button").click(function () {
          const target = $(this).data("target");
          showTab(target);
        });

        // Initial tab
        showTab("dropdown1");
      });

      $("#start-btn").click(function () {
        const form = $("form")[0];

        // Disable inputs in hidden sections
        $("#dropdown1, #dropdown2, #qr-scanner")
          .filter(":hidden")
          .find("input, select, textarea")
          .attr("disabled", true);

        // Validate
        if (!form.checkValidity()) {
          form.reportValidity();

          // Re-enable inputs after validation attempt
          $("input, select, textarea").removeAttr("disabled");
          return;
        }

        // Re-enable all inputs before collecting data
        $("input, select, textarea").removeAttr("disabled");

        // Collect data
        let selectedType = $(".tab-button.active").text().trim();
        let details = {};

        if (selectedType === "LO") {
          details.protocol = $("#dropdown1 select").val();
          details.host = $("#dropdown1 input[type='text']").val();
          details.port = $("#dropdown1 input[type='number']").val();
        }

        if (selectedType === "IP") {
          details.id = $("#dropdown2 input[type='text']").val();
          details.password = $("#dropdown2 input[type='password']").val();
        }

        if (selectedType === "QR") {
          details.message = "QR code scanned will appear here.";
          if (typeof qr !== "undefined" && qrStarted) {
            qr.stop()
              .then(() => console.log("QR scanner stopped."))
              .catch(err => console.error("Error stopping QR scanner:", err));
          }
        }

        // Clear the UI
        if (selectedType === "LO") {
          loadIFrame(
            `${details.protocol}://${details.host.trim()}:${details.port}`
          );
        } else if (selectedType === "IP") {
        }
      });

      function loadIFrame(url) {
        $("#main").empty().append(`
          <iframe src="${url}" class="w-full h-full rounded-lg rounded-tl-none rounded-br-none"></iframe>
        `);
      }
    </script>
  </body>
</html>
