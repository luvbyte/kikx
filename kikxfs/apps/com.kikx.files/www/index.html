<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Files</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="js/tailwind-3.js"></script>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Fullscreen Loading Screen -->
    <div
      id="loading-screen"
      class="fixed inset-0 w-full h-full flex flex-col justify-center items-center font-bold"
    >
      <div
        class="border-white border-b w-6 h-6 animate-spin rounded-full"
      ></div>
    </div>

    <div id="file-browser" class="panel h-dvh flex flex-col gap-2 text-white">
      <div class="flex gap-1 p-2 px-2 shadow-2xl items-center">
        <!-- home -->
        <div
          onclick="goHomePath()"
          class="active:bg-purple-400/40 rounded-full"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="25"
            height="25"
            fill="currentColor"
            class="bi bi-house"
            viewBox="0 0 16 16"
          >
            <path
              d="M8.707 1.5a1 1 0 0 0-1.414 0L.646 8.146a.5.5 0 0 0 .708.708L2 8.207V13.5A1.5 1.5 0 0 0 3.5 15h9a1.5 1.5 0 0 0 1.5-1.5V8.207l.646.647a.5.5 0 0 0 .708-.708L13 5.793V2.5a.5.5 0 0 0-.5-.5h-1a.5.5 0 0 0-.5.5v1.293zM13 7.207V13.5a.5.5 0 0 1-.5.5h-9a.5.5 0 0 1-.5-.5V7.207l5-5z"
            />
          </svg>
        </div>
        <!-- go up -->
        <div
          onclick="goBackOnePath()"
          class="active:bg-purple-400/40 rounded-full"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="25"
            height="25"
            fill="currentColor"
            class="bi bi-arrow-up-circle"
            viewBox="0 0 16 16"
          >
            <path
              fill-rule="evenodd"
              d="M1 8a7 7 0 1 0 14 0A7 7 0 0 0 1 8m15 0A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-7.5 3.5a.5.5 0 0 1-1 0V5.707L5.354 7.854a.5.5 0 1 1-.708-.708l3-3a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 5.707z"
            />
          </svg>
        </div>

        <input
          id="file-path"
          class="flex-1 bg-transparent rounded border focus:outline-none px-2"
        />
      </div>
      <div
        id="files-panel"
        class="grid grid-cols-[repeat(auto-fill,minmax(64px,1fr))] gap-3 p-2 overflow-y-auto"
      ></div>
    </div>

    <!-- text editor -->
    <div id="text-editor" class="panel hidden relative h-dvh flex flex-col">
      <div class="bg-blue-400 p-2 flex justify-between items-center">
        <h1 id="text-filename" class="text-md text-white"></h1>
        <button
          onclick="closeFile()"
          class="bg-red-400 text-white rounded shadow-lg p-1"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
          >
            <path
              fill="currentColor"
              d="m12 13.4l-4.9 4.9q-.275.275-.7.275t-.7-.275t-.275-.7t.275-.7l4.9-4.9l-4.9-4.9q-.275-.275-.275-.7t.275-.7t.7-.275t.7.275l4.9 4.9l4.9-4.9q.275-.275.7-.275t.7.275t.275.7t-.275.7L13.4 12l4.9 4.9q.275.275.275.7t-.275.7t-.7.275t-.7-.275z"
            />
          </svg>
        </button>
      </div>
      <textarea
        id="text-panel"
        class="flex-1 bg-white/20 text-white p-2 focus:outline-none"
      ></textarea>

      <div
        onclick="saveTextFile()"
        class="absolute border bg-blue-400/60 rounded bottom-4 right-4 font-bold p-1 px-4 text-white"
      >
        SAVE
      </div>
    </div>

    <!-- image viewer -->
    <div
      id="image-viewer"
      class="panel hidden relative h-dvh flex flex-col bg-white/20"
    >
      <div class="bg-blue-400 p-2 flex justify-between items-center">
        <h1 id="image-filename" class="text-md text-white"></h1>
        <div
          onclick="closeFile()"
          class="bg-red-400 text-white rounded shadow-lg p-1"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
          >
            <path
              fill="currentColor"
              d="m12 13.4l-4.9 4.9q-.275.275-.7.275t-.7-.275t-.275-.7t.275-.7l4.9-4.9l-4.9-4.9q-.275-.275-.275-.7t.275-.7t.7-.275t.7.275l4.9 4.9l4.9-4.9q.275-.275.7-.275t.7.275t.275.7t-.275.7L13.4 12l4.9 4.9q.275.275.275.7t-.275.7t-.7.275t-.7-.275z"
            />
          </svg>
        </div>
      </div>
      <div class="flex-1 flex justify-center items-center">
        <img id="image-frame" class="border dark:border-none w-[80%]" />
      </div>
    </div>

    <script src="js/jquery.min.js"></script>
    <script src="js/kikx-sdk.umd.js"></script>

    <script defer src="script.js"></script>
  </body>
</html>
