<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KIKX Login</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #1e1e1e;
        padding-top: 80px;
        display: flex;
        justify-content: center;
      }

      .container {
        background-color: #2c2c2c;
        padding: 40px 30px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        width: 90%;
        max-width: 360px;
        text-align: center;
      }

      h1 {
        font-size: 1.8rem;
        font-weight: 600;
        color: #ff6f00;
        margin-bottom: 20px;
      }

      input[type="password"] {
        width: 100%;
        padding: 14px 16px;
        border-radius: 8px;
        border: 1px solid #444;
        background-color: #1e1e1e;
        color: #ffffff;
        font-size: 1rem;
        outline: none;
        margin-bottom: 20px;
        transition:
          border-color 0.3s,
          box-shadow 0.3s;
      }

      input[type="password"]::placeholder {
        color: #888;
      }

      input[type="password"]:focus {
        border-color: #ff6f00;
        box-shadow: 0 0 5px rgba(255, 111, 0, 0.5);
      }

      button {
        width: 100%;
        padding: 14px 16px;
        border-radius: 8px;
        border: 2px solid #ff6f00;
        background-color: transparent;
        color: #ff6f00;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          background-color 0.2s,
          box-shadow 0.2s,
          color 0.2s;
      }

      button:active {
        background-color: #ff6f00;
        color: #1e1e1e;
        box-shadow: 0 5px 15px rgba(255, 111, 0, 0.3);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      .error-message {
        color: #ff6f00;
        font-size: 0.9rem;
        margin-top: 10px;
        min-height: 1.2rem; /* reserve space */
      }

      /* full overlay */
      #black {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #000; /* bg-stone-800 */
        z-index: 9999;
        overflow: hidden;
      }
      #black.fade-out {
        opacity: 0;
        transition: opacity 1s ease;
        pointer-events: none; /* so nothing is clickable */
      }

      @media (max-width: 400px) {
        .container {
          padding: 30px 20px;
        }
        h1 {
          font-size: 1.5rem;
        }
        input[type="password"],
        button {
          padding: 12px 14px;
          font-size: 0.95rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>KIKX - LOGIN</h1>
      <form id="loginForm">
        <input
          name="access"
          type="password"
          placeholder="Access Key"
          required
        />
        <button type="submit" id="submitBtn">ENTER</button>
      </form>
      <div class="error-message" id="errorMsg"></div>
    </div>

    <!-- full-screen overlay -->
    <div id="black"></div>

    <script>
      const form = document.getElementById("loginForm");
      const submitBtn = document.getElementById("submitBtn");
      const errorMsg = document.getElementById("errorMsg");
      const overlay = document.getElementById("black");

      let processing = false;

      form.addEventListener("submit", async e => {
        e.preventDefault();
        if (processing) return; // prevent duplicate submits
        processing = true;
        submitBtn.disabled = true;
        errorMsg.textContent = "";

        const formData = new FormData(form);
        const body = new URLSearchParams(formData);

        try {
          const response = await fetch("/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/x-www-form-urlencoded"
            },
            body: body.toString()
          });

          if (response.ok) {
            // blur input so keyboard closes (only on success)
            if (form.access && typeof form.access.blur === "function") {
              form.access.blur();
            }
            overlay.style.display = "block";

            // check ui if found then go /ui/<ui>
            const params = new URLSearchParams(window.location.search);

            if (params.has("ui")) {
              window.location.href = "/ui/" + params.get("ui");
            } else {
              window.location.href = "/"
            }
          } else {
            let msg = "Login failed";
            try {
              const data = await response.json();
              msg = data.detail || msg;
            } catch (err) {}
            errorMsg.textContent = msg;

            // clear the input on failure
            if (form.access) {
              form.access.value = "";
            }
          }
        } catch (err) {
          console.error(err);
          errorMsg.textContent = "Network error, please try again";

          // also clear the input on network error
          if (form.access) {
            form.access.value = "";
          }
        } finally {
          processing = false;
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
