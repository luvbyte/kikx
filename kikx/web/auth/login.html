<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KIKX Login</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #1e1e1e;
        padding-top: 80px;
        display: flex;
        justify-content: center;
      }

      .container {
        background-color: #2c2c2c;
        padding: 40px 30px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        width: 90%;
        max-width: 360px;
        text-align: center;
      }

      h1 {
        font-size: 1.8rem;
        font-weight: 600;
        color: #ff6f00;
        margin-bottom: 20px;
      }

      input[type="password"],
      select {
        width: 100%;
        padding: 14px 16px;
        border-radius: 8px;
        border: 1px solid #444;
        background-color: #1e1e1e;
        color: #ffffff;
        font-size: 1rem;
        outline: none;
        transition:
          border-color 0.3s,
          box-shadow 0.3s;
      }

      input[type="password"] {
        margin-bottom: 15px;
      }

      select {
        margin-bottom: 15px;
      }

      input[type="password"]:focus,
      select:focus {
        border-color: #ff6f00;
        box-shadow: 0 0 5px rgba(255, 111, 0, 0.5);
      }

      button {
        width: 100%;
        padding: 14px 16px;
        border-radius: 8px;
        border: 2px solid #ff6f00;
        background-color: transparent;
        color: #ff6f00;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }

      button:active {
        background-color: #ff6f00;
        color: #1e1e1e;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      .error-message {
        color: #ff6f00;
        font-size: 0.9rem;
        margin-top: 10px;
        min-height: 1.2rem;
      }

      #black {
        display: none;
        position: fixed;
        inset: 0;
        background-color: #000;
        z-index: 9999;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>KIKX - LOGIN</h1>

      <form id="loginForm">
        <input
          name="access"
          type="password"
          placeholder="Access Key"
          required
        />
        <select name="ui" id="uiSelect" disabled>
          <option>Loading...</option>
        </select>

        <button type="submit" id="submitBtn" disabled>ENTER</button>
      </form>

      <div class="error-message" id="errorMsg"></div>
    </div>

    <div id="black"></div>

    <script>
      const form = document.getElementById("loginForm");
      const submitBtn = document.getElementById("submitBtn");
      const errorMsg = document.getElementById("errorMsg");
      const overlay = document.getElementById("black");
      const uiSelect = document.getElementById("uiSelect");

      let processing = false;
      let uiList = [];
      let defaultUI = null;
      let uiLoaded = false;

      async function loadUIList() {
        try {
          const response = await fetch("/api/ui-list");

          if (!response.ok) {
            throw new Error("Failed to fetch UI list");
          }

          const data = await response.json();

          uiList = Array.isArray(data.ui) ? data.ui : [];
          defaultUI = data.default || uiList[0] || null;

          if (!uiList.length) {
            throw new Error("Empty UI list");
          }

          uiSelect.innerHTML = "";

          uiList.forEach(ui => {
            const option = document.createElement("option");
            option.value = ui;
            option.textContent = ui.toUpperCase();
            uiSelect.appendChild(option);
          });

          if (defaultUI && uiList.includes(defaultUI)) {
            uiSelect.value = defaultUI;
          }

          uiSelect.disabled = false;
          submitBtn.disabled = false;
          uiLoaded = true;
        } catch (err) {
          console.error("UI load failed:", err);

          // Safe fallback
          uiList = ["kui"];
          defaultUI = "kui";

          uiSelect.innerHTML = "";
          const option = document.createElement("option");
          option.value = "kui";
          option.textContent = "KUI";
          uiSelect.appendChild(option);

          uiSelect.disabled = false;
          submitBtn.disabled = false;
          uiLoaded = true;
        }
      }

      loadUIList();

      form.addEventListener("submit", async e => {
        e.preventDefault();
        if (processing || !uiLoaded) return;

        processing = true;
        submitBtn.disabled = true;
        errorMsg.textContent = "";

        const formData = new FormData(form);
        const body = new URLSearchParams(formData);

        try {
          const response = await fetch("/login", {
            method: "POST",
            headers: {
              "Content-Type": "application/x-www-form-urlencoded"
            },
            body: body.toString()
          });

          if (response.ok) {
            if (form.access && typeof form.access.blur === "function") {
              form.access.blur();
            }

            overlay.style.display = "block";

            const selectedUI = uiList.includes(uiSelect.value)
              ? uiSelect.value
              : defaultUI;

            window.location.href = "/ui/" + selectedUI;
          } else {
            let msg = "Login failed";

            try {
              const data = await response.json();
              msg = data.detail || msg;
            } catch (_) {}

            errorMsg.textContent = msg;
            if (form.access) form.access.value = "";
          }
        } catch (err) {
          console.error(err);
          errorMsg.textContent = "Network error, please try again";
          if (form.access) form.access.value = "";
        } finally {
          processing = false;
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
